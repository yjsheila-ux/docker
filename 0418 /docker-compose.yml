services:
  api:
    build: ./api 
    ports:
      - "8000:8000"
    depends_on:
      - db 
    volumes:
      - ./api:/app 

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: {password}
      MYSQL_DATABASE: {dbname} 
    ports:
      - "{myPortsNum}:3306"
        # MYSQL = 3306 포트번호
    volumes:
      - local_db:/var/lib/mysql 
      
  worker:
    build: ./worker 
    volumes:
      - ./worker:/app 
    depends_on:
      - redis

  redis:
    image: redis:8

volumes:
  local_db:
